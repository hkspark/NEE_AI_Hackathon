server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Don't cache the HTML shell so updates show immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Cache static assets (data.js is regenerated on rebuild, so a short cache is fine).
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
